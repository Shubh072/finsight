<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password · FinSight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/design-system.css"/>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    .auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--surface-dim);padding:32px 20px;position:relative;overflow:hidden}
    .auth-page::before{content:'';position:absolute;top:-30%;left:-10%;width:60%;height:80%;background:radial-gradient(circle,rgba(124,58,237,.12),transparent 70%);pointer-events:none}
    .auth-card{width:100%;max-width:440px;background:var(--surface-base);border:1px solid var(--outline);border-radius:var(--radius-2xl);padding:40px;position:relative;z-index:1;box-shadow:var(--shadow-2xl)}
    .input-pw-wrap{position:relative}.input-pw-wrap input{padding-right:44px}
    .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--on-surface-muted);cursor:pointer}
    .pw-strength{height:4px;border-radius:2px;background:var(--surface-container);margin-top:8px;overflow:hidden}
    .pw-strength-bar{height:100%;width:0;border-radius:2px;transition:all .3s}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <a href="/landing.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:32px">
      <div style="width:36px;height:36px;background:var(--color-primary-gradient);border-radius:10px;display:flex;align-items:center;justify-content:center"><span class="material-symbols-outlined" style="font-size:18px;color:white">insights</span></div>
      <span style="font-size:20px;font-weight:800;color:var(--on-surface)">FinSight</span>
    </a>

    <div id="step-reset">
      <div style="width:56px;height:56px;background:var(--color-primary-bg);border-radius:var(--radius-xl);display:flex;align-items:center;justify-content:center;margin-bottom:20px">
        <span class="material-symbols-outlined" style="font-size:28px;color:var(--color-primary)">lock</span>
      </div>
      <h1 style="font-size:24px;font-weight:800;color:var(--on-surface);margin-bottom:8px">Set new password</h1>
      <p style="font-size:14px;color:var(--on-surface-muted);margin-bottom:28px">Must be at least 8 characters with uppercase, lowercase and a number.</p>

      <div id="rp-error" style="background:var(--color-error-bg);border:1px solid rgba(239,68,68,.2);color:var(--color-error);font-size:13px;padding:12px 14px;border-radius:var(--radius-md);margin-bottom:16px;display:none;align-items:center;gap:8px">
        <span class="material-symbols-outlined" style="font-size:16px">error</span><span id="rp-error-text">Error</span>
      </div>

      <form id="rp-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="rp-pw">New Password</label>
          <div class="input-pw-wrap">
            <input type="password" id="rp-pw" class="form-input" placeholder="New password" style="height:44px" oninput="checkPw(this.value)" required/>
            <button type="button" class="pw-toggle" onclick="togglePw('rp-pw',this)"><span class="material-symbols-outlined" style="font-size:18px">visibility</span></button>
          </div>
          <div class="pw-strength"><div class="pw-strength-bar" id="pw-bar"></div></div>
          <div id="pw-label" style="font-size:11px;font-weight:600;margin-top:4px;color:var(--on-surface-muted)">Enter a password</div>
        </div>
        <div class="form-group">
          <label class="form-label" for="rp-confirm">Confirm Password</label>
          <div class="input-pw-wrap">
            <input type="password" id="rp-confirm" class="form-input" placeholder="Confirm password" style="height:44px" required/>
            <button type="button" class="pw-toggle" onclick="togglePw('rp-confirm',this)"><span class="material-symbols-outlined" style="font-size:18px">visibility</span></button>
          </div>
          <div class="form-error" id="rp-confirm-err"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-full" id="rp-btn" style="height:48px;font-size:15px;margin-bottom:20px">
          <span id="rp-btn-text">Reset Password</span>
          <span id="rp-spinner" style="display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite"></span>
        </button>
      </form>
    </div>

    <div id="step-done" style="display:none;text-align:center">
      <div style="width:72px;height:72px;background:var(--color-success-bg);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
        <span class="material-symbols-outlined" style="font-size:36px;color:var(--color-success)">check_circle</span>
      </div>
      <h2 style="font-size:22px;font-weight:800;margin-bottom:10px">Password reset!</h2>
      <p style="font-size:14px;color:var(--on-surface-muted);margin-bottom:28px">Your password has been successfully updated. You can now sign in with your new password.</p>
      <a href="/login.html" class="btn btn-primary btn-md btn-full">Sign In Now</a>
    </div>
  </div>
</div>
<script>
  const t = localStorage.getItem('finsight_theme') || 'dark';
  document.documentElement.classList.toggle('dark', t === 'dark');
  const urlToken = new URLSearchParams(window.location.search).get('token');
  if (!urlToken) { document.getElementById('rp-error-text').textContent = 'Invalid or missing reset token. Please request a new link.'; document.getElementById('rp-error').style.display = 'flex'; document.getElementById('rp-form').style.pointerEvents = 'none'; document.getElementById('rp-form').style.opacity = '0.5'; }

  function togglePw(id, btn) { const inp = document.getElementById(id); const icon = btn.querySelector('.material-symbols-outlined'); inp.type = inp.type === 'password' ? 'text' : 'password'; icon.textContent = inp.type === 'password' ? 'visibility' : 'visibility_off'; }
  function checkPw(pw) {
    const bar = document.getElementById('pw-bar'); const label = document.getElementById('pw-label');
    let s = 0; if(pw.length>=8)s++; if(/[A-Z]/.test(pw))s++; if(/[a-z]/.test(pw))s++; if(/[0-9]/.test(pw))s++; if(/[^A-Za-z0-9]/.test(pw))s++;
    const levels=[{w:'0%',c:'',t:'Enter a password'},{w:'20%',c:'#ef4444',t:'Very Weak'},{w:'40%',c:'#f97316',t:'Weak'},{w:'60%',c:'#f59e0b',t:'Fair'},{w:'80%',c:'#10b981',t:'Strong'},{w:'100%',c:'#059669',t:'Very Strong'}];
    const l=levels[s]||levels[0]; bar.style.width=l.w; bar.style.background=l.c; label.textContent=l.t; label.style.color=l.c||'var(--on-surface-muted)';
  }
  document.getElementById('rp-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = document.getElementById('rp-pw').value;
    const confirm_password = document.getElementById('rp-confirm').value;
    document.getElementById('rp-confirm-err').textContent = '';
    if (password !== confirm_password) { document.getElementById('rp-confirm-err').textContent = 'Passwords do not match'; return; }
    const btn = document.getElementById('rp-btn'); const txt = document.getElementById('rp-btn-text'); const spin = document.getElementById('rp-spinner');
    btn.disabled = true; txt.style.display = 'none'; spin.style.display = 'inline-block';
    try {
      const res = await axios.post(`/api/auth/reset-password/${urlToken}`, { password, confirm_password });
      if (res.data.success) { document.getElementById('step-reset').style.display = 'none'; document.getElementById('step-done').style.display = 'block'; }
      else { document.getElementById('rp-error-text').textContent = res.data.message || 'Reset failed.'; document.getElementById('rp-error').style.display = 'flex'; }
    } catch (err) {
      document.getElementById('rp-error-text').textContent = err.response?.data?.message || 'Something went wrong.';
      document.getElementById('rp-error').style.display = 'flex';
    } finally { btn.disabled = false; txt.style.display = 'inline'; spin.style.display = 'none'; }
  });
</script>
</body>
</html>
