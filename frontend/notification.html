<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications · FinSight</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/css/design-system.css" />
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="/auth-guard.js"></script>
  <style>
    .notif-item {
      display: flex;
      gap: 14px;
      padding: 16px;
      border-radius: var(--radius-lg);
      margin-bottom: 10px;
      cursor: pointer;
      transition: all .2s;
      border: 1px solid transparent
    }

    .notif-item:hover {
      background: var(--surface-container-low);
      border-color: var(--outline)
    }

    .notif-item.unread {
      border-left: 3px solid var(--color-primary)
    }

    .notif-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }

    .notif-icon.alert {
      background: var(--color-error-bg);
      color: var(--color-error)
    }

    .notif-icon.info {
      background: var(--color-primary-bg);
      color: var(--color-primary)
    }

    .notif-icon.success {
      background: var(--color-success-bg);
      color: var(--color-success)
    }

    .notif-icon.warning {
      background: var(--color-warning-bg);
      color: var(--color-warning)
    }

    .notif-content {
      flex: 1;
      min-width: 0
    }

    .notif-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 3px
    }

    .notif-text {
      font-size: 13px;
      color: var(--on-surface-muted);
      line-height: 1.5
    }

    .notif-time {
      font-size: 11px;
      color: var(--on-surface-muted);
      margin-top: 4px;
      white-space: nowrap
    }

    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface-base);
      border-top: 1px solid var(--outline);
      z-index: 250;
      padding: 6px 0 max(6px, env(safe-area-inset-bottom))
    }

    .mob-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 4px;
      font-size: 10px;
      font-weight: 600;
      color: var(--on-surface-muted);
      transition: all .2s;
      flex: 1;
      cursor: pointer;
      text-decoration: none
    }

    .mob-nav-item.active,
    .mob-nav-item:hover {
      color: var(--color-primary)
    }

    .mob-nav-item .material-symbols-outlined {
      font-size: 22px
    }

    @media(max-width:767px) {
      .mobile-nav {
        display: flex
      }

      .app-content {
        padding-bottom: 80px !important
      }
    }
  </style>
</head>

<body>
  <div class="app-layout">
    <aside class="app-sidebar">[sidebar]</aside>
    <div class="app-main">
      <header class="app-header">[header]</header>
      <main class="app-content">
        <div class="page-header">
          <div>
            <h1>Notifications</h1>
            <p style="font-size:14px;color:var(--on-surface-muted);margin-top:4px">Stay updated with your financial
              alerts</p>
          </div><button class="btn btn-outline btn-md" onclick="markAllRead()"><span
              class="material-symbols-outlined">done_all</span>Mark All Read</button>
        </div>
        <div id="notif-list">
          <div class="card" style="padding:40px;text-align:center;color:var(--on-surface-muted)"><span
              class="material-symbols-outlined"
              style="font-size:40px;display:block;margin-bottom:12px">notifications</span>Loading notifications...</div>
        </div>
      </main>
    </div>
    <nav class="mobile-nav"><a href="/dashboard.html" class="mob-nav-item"><span
          class="material-symbols-outlined">dashboard</span>Home</a><a href="/expense.html" class="mob-nav-item"><span
          class="material-symbols-outlined">payments</span>Expenses</a><a href="/budget.html" class="mob-nav-item"><span
          class="material-symbols-outlined">account_balance</span>Budget</a><a href="/investment.html"
        class="mob-nav-item"><span class="material-symbols-outlined">trending_up</span>Invest</a><a href="/setting.html"
        class="mob-nav-item"><span class="material-symbols-outlined">settings</span>Settings</a></nav>
  </div>
  <script>
    (function () {
      'use strict'; const API = '/api';
      function getToken() { return localStorage.getItem('finsight_token') || localStorage.getItem('access_token') }
      async function api(url, opts = {}) { const t = getToken(); opts.headers = { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json', ...opts.headers }; const res = await fetch(API + url, opts); if (!res.ok) throw new Error(await res.text()); return res.json() }
      function timeAgo(d) { const s = Math.floor((Date.now() - new Date(d).getTime()) / 1000); if (s < 60) return 'Just now'; if (s < 3600) return Math.floor(s / 60) + 'm ago'; if (s < 86400) return Math.floor(s / 3600) + 'h ago'; return Math.floor(s / 86400) + 'd ago' }
      function loadNotifications() { api('/notifications').then(data => { const items = data.notifications || data.data || []; renderNotifications(items) }).catch(() => { document.getElementById('notif-list').innerHTML = '<div class="card" style="padding:40px;text-align:center;color:var(--on-surface-muted)">Failed to load notifications.</div>' }) }
      function renderNotifications(items) {
        const el = document.getElementById('notif-list'); if (!el) return; if (!items.length) { el.innerHTML = '<div class="card" style="padding:60px 40px;text-align:center"><span class="material-symbols-outlined" style="font-size:48px;display:block;margin-bottom:16px;color:var(--on-surface-muted)">notifications</span><h3 style="font-size:18px;margin-bottom:8px">No notifications</h3><p style="color:var(--on-surface-muted);font-size:14px">You\'re all caught up! Check back later for updates.</p></div>'; return }
        const icons = { alert: 'error', info: 'info', success: 'check_circle', warning: 'warning' };
        el.innerHTML = '<div style="display:flex;flex-direction:column;gap:8px">' + items.map(n => `<div class="notif-item ${n.read ? '' : 'unread'}" onclick="markRead('${n.id}')">
<div class="notif-icon ${n.type || 'info'}"><span class="material-symbols-outlined">${icons[n.type] || 'info'}</span></div>
<div class="notif-content"><div class="notif-title">${n.title || 'Notification'}</div><div class="notif-text">${n.message || n.body || ''}</div><div class="notif-time">${timeAgo(n.created_at || n.timestamp || Date.now())}</div></div>
</div>`).join('') + '</div>'
      }
      window.markRead = async function (id) { try { await fetch(API + '/notifications/' + id + '/read', { method: 'POST', headers: { 'Authorization': 'Bearer ' + getToken() } }); loadNotifications() } catch (e) { } };
      window.markAllRead = async function () { try { await fetch(API + '/notifications/read-all', { method: 'POST', headers: { 'Authorization': 'Bearer ' + getToken() } }); loadNotifications() } catch (e) { alert('Failed to mark all as read') } };
      document.addEventListener('DOMContentLoaded', loadNotifications);
    })();
  </script>
</body>

</html>
