<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Expenses · FinSight</title>
  <meta name="description" content="Manage and track all your expenses in one place." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/css/design-system.css" />
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="/auth-guard.js"></script>
  <style>
    .expense-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 20px
    }

    .expense-filters .form-input,
    .expense-filters .form-select {
      height: 38px;
      font-size: 13px
    }

    .expense-table td,
    .expense-table th {
      padding: 12px 16px
    }

    .expense-row {
      cursor: pointer;
      transition: background .2s
    }

    .expense-row:hover {
      background: var(--surface-container-low)
    }

    .expense-row .category-badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 100px;
      font-weight: 600
    }

    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface-base);
      border-top: 1px solid var(--outline);
      z-index: 250;
      padding: 6px 0 max(6px, env(safe-area-inset-bottom))
    }

    .mob-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 4px;
      font-size: 10px;
      font-weight: 600;
      color: var(--on-surface-muted);
      transition: all .2s;
      flex: 1;
      cursor: pointer;
      text-decoration: none
    }

    .mob-nav-item.active,
    .mob-nav-item:hover {
      color: var(--color-primary)
    }

    .mob-nav-item .material-symbols-outlined {
      font-size: 22px
    }

    @media(max-width:767px) {
      .mobile-nav {
        display: flex
      }

      .app-content {
        padding-bottom: 80px !important
      }

      .expense-filters .form-input {
        width: 100%
      }
    }
  </style>
</head>

<body>
  <div class="app-layout">
    <aside class="app-sidebar" id="app-sidebar">[sidebar]</aside>
    <div class="app-main">
      <header class="app-header">[header]</header>
      <main class="app-content">
        <div class="page-header">
          <div>
            <h1>Expenses</h1>
            <p style="font-size:14px;color:var(--on-surface-muted);margin-top:4px">All your transactions in one place
            </p>
          </div><a href="/add_expense.html" class="btn btn-primary btn-md"><span
              class="material-symbols-outlined">add</span>Add Expense</a>
        </div>
        <div class="card">
          <div class="expense-filters"><input type="text" id="expense-search" class="form-input"
              placeholder="Search expenses..." style="flex:1;min-width:160px" /><select id="expense-category"
              class="form-select">
              <option value="">All Categories</option>
              <option>Food & Dining</option>
              <option>Transportation</option>
              <option>Shopping</option>
              <option>Bills & Utilities</option>
              <option>Entertainment</option>
              <option>Healthcare</option>
              <option>Education</option>
              <option>Travel</option>
              <option>Groceries</option>
              <option>Other</option>
            </select><select id="expense-sort" class="form-select">
              <option value="desc">Newest First</option>
              <option value="asc">Oldest First</option>
              <option value="amount_high">Highest Amount</option>
              <option value="amount_low">Lowest Amount</option>
            </select></div>
          <div id="expense-list">
            <div style="padding:40px;text-align:center;color:var(--on-surface-muted)"><span
                class="material-symbols-outlined"
                style="font-size:40px;display:block;margin-bottom:12px">receipt_long</span>Loading expenses...</div>
          </div>
        </div>
      </main>
    </div>
    <nav class="mobile-nav"><a href="/dashboard.html" class="mob-nav-item"><span
          class="material-symbols-outlined">dashboard</span>Home</a><a href="/expense.html"
        class="mob-nav-item active"><span class="material-symbols-outlined">payments</span>Expenses</a><a
        href="/budget.html" class="mob-nav-item"><span
          class="material-symbols-outlined">account_balance</span>Budget</a><a href="/investment.html"
        class="mob-nav-item"><span class="material-symbols-outlined">trending_up</span>Invest</a><a href="/setting.html"
        class="mob-nav-item"><span class="material-symbols-outlined">settings</span>Settings</a></nav>
  </div>
  <script>
    (function () {
      'use strict';
      const API = '/api'; const $ = id => document.getElementById(id);
      function getToken() { return localStorage.getItem('finsight_token') || localStorage.getItem('access_token') }
      async function api(url, opts = {}) { const t = getToken(); opts.headers = { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json', ...opts.headers }; const res = await fetch(API + url, opts); if (!res.ok) throw new Error(await res.text()); return res.json() }
      function fmt(n, c = 'INR') { return new Intl.NumberFormat('en-IN', { style: 'currency', currency: c, minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(n || 0) }
      function dateStr(d) { return new Date(d).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) }
      function categoryColor(cat) { const m = { 'Food & Dining': '#10b981', 'Transportation': '#6366f1', 'Shopping': '#ec4899', 'Bills & Utilities': '#f59e0b', 'Entertainment': '#8b5cf6', 'Healthcare': '#ef4444', 'Education': '#14b8a6', 'Travel': '#f97316', 'Groceries': '#06b6d4', 'Other': '#6b7280' }; return m[cat] || '#6b7280' }
      let expenses = [];
      function loadExpenses() { const search = $('expense-search')?.value || ''; const category = $('expense-category')?.value || ''; const sort = $('expense-sort')?.value || 'desc'; let url = `/expenses?sort=${sort}&limit=100`; if (search) url += `&search=${encodeURIComponent(search)}`; if (category) url += `&category=${encodeURIComponent(category)}`; api(url).then(data => { expenses = data.expenses || data.data || data || []; renderExpenses(expenses) }).catch(() => { $('expense-list').innerHTML = '<div style="padding:40px;text-align:center;color:var(--on-surface-muted)">Failed to load expenses.</div>' }) }
      function renderExpenses(items) {
        const el = $('expense-list'); if (!el) return; if (!items.length) { el.innerHTML = '<div style="padding:60px 40px;text-align:center"><span class="material-symbols-outlined" style="font-size:48px;display:block;margin-bottom:16px;color:var(--on-surface-muted)">receipt_long</span><h3 style="font-size:18px;margin-bottom:8px">No expenses found</h3><p style="color:var(--on-surface-muted);margin-bottom:20px;font-size:14px">Start tracking your spending by adding your first expense.</p><a href="/add_expense.html" class="btn btn-primary"><span class="material-symbols-outlined">add</span>Add Expense</a></div>'; return }
        el.innerHTML = '<table class="data-table expense-table"><thead><tr><th>Description</th><th>Category</th><th>Date</th><th>Merchant</th><th style="text-align:right">Amount</th><th style="text-align:right"></th></tr></thead><tbody>' + items.map(e => `<tr class="expense-row" onclick="window.location.href='/add_expense.html?edit=${e.id}'"><td><div style="font-weight:600;font-size:13px">${e.title || e.description || 'Untitled'}</div></td><td><span class="category-badge" style="background:${categoryColor(e.category || 'Other')}20;color:${categoryColor(e.category || 'Other')}">${e.category || 'Other'}</span></td><td style="font-size:13px;color:var(--on-surface-muted)">${dateStr(e.expense_date || e.date || e.created_at)}</td><td style="font-size:13px;color:var(--on-surface-muted)">${e.merchant_name || e.merchant || '-'}</td><td style="text-align:right;font-weight:700;color:var(--color-error)">${fmt(e.amount)}</td><td style="text-align:right"><button class="btn-icon btn-ghost btn-sm" onclick="event.stopPropagation();deleteExpense('${e.id}')" title="Delete"><span class="material-symbols-outlined" style="font-size:16px">delete</span></button></td></tr>`).join('') + '</tbody></table>'
      }
      window.deleteExpense = async function (id) { if (!confirm('Delete this expense?')) return; try { const t = getToken(); await fetch(API + `/expenses/${id}`, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + t } }); loadExpenses() } catch (e) { alert('Failed to delete') } }
      $('expense-search')?.addEventListener('input', () => { clearTimeout(window._searchTimer); window._searchTimer = setTimeout(loadExpenses, 300) });
      $('expense-category')?.addEventListener('change', loadExpenses);
      $('expense-sort')?.addEventListener('change', loadExpenses);
      document.addEventListener('DOMContentLoaded', loadExpenses);
    })();
  </script>
</body>

</html>
