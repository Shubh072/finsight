<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Analytics · FinSight</title>
  <meta name="description"
    content="Deep financial analytics with AI-powered insights, trends, and spending patterns." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/css/design-system.css" />
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="/auth-guard.js"></script>
  <style>
    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border: 1px solid var(--outline);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      background: transparent;
      color: var(--on-surface-secondary)
    }

    .filter-chip.active,
    .filter-chip:hover {
      background: var(--color-primary-bg);
      border-color: var(--color-primary);
      color: var(--color-primary)
    }

    .stat-tile {
      text-align: center;
      padding: 16px;
      border-radius: var(--radius-lg)
    }

    .stat-tile .value {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em
    }

    .stat-tile .label {
      font-size: 12px;
      color: var(--on-surface-muted);
      margin-top: 4px
    }

    .stat-tile .change {
      font-size: 11px;
      font-weight: 600;
      display: block;
      margin-top: 2px
    }

    .analytics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px
    }

    @media(max-width:600px) {
      .analytics-grid {
        grid-template-columns: 1fr 1fr
      }
    }
  </style>
</head>

<body>
  <div class="app-layout">
    <aside class="app-sidebar" id="app-sidebar">[sidebar same as dashboard]</aside>
    <div class="app-main">
      <header class="app-header">[header same as dashboard]</header>
      <main class="app-content">
        <div class="page-header">
          <div>
            <h1>Analytics</h1>
            <p style="font-size:14px;color:var(--on-surface-muted);margin-top:4px">Deep dive into your financial
              patterns</p>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <select id="analytics-period" class="form-select" style="width:auto;height:36px;font-size:13px">
              <option value="7">7 Days</option>
              <option value="30" selected>30 Days</option>
              <option value="90">Quarter</option>
              <option value="365">Year</option>
            </select>
            <button class="btn btn-primary btn-sm" onclick="exportAnalytics()"><span class="material-symbols-outlined"
                style="font-size:16px">download</span>Export</button>
          </div>
        </div>
        <div id="analytics-content"></div>
      </main>
    </div>
  </div>
  <script>
    (function () {
      'use strict';
      const API = '/api'; const $ = id => document.getElementById(id);
      async function api(url, opts = {}) { const t = localStorage.getItem('finsight_token') || localStorage.getItem('access_token'); opts.headers = { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json', ...opts.headers }; const res = await fetch(API + url, opts); if (!res.ok) throw new Error(await res.text()); return res.json() }
      function fmt(n, c = 'INR') { return new Intl.NumberFormat('en-IN', { style: 'currency', currency: c, minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(n || 0) }
      function loadAnalytics(days) { api(`/analytics/summary?days=${days}`).then(data => { const d = data.data || data || {}; renderStats(d) }); api(`/analytics/income-expenses?days=${days}`).then(renderMainChart); api(`/analytics/category-breakdown?days=${days}`).then(renderCategoryChart); api(`/analytics/trends?days=${days}`).then(renderTrends) }
      function renderStats(d) {
        document.getElementById('analytics-content').innerHTML = `
<div class="analytics-grid mb-6">
<div class="card stat-tile"><div class="value" style="color:var(--color-primary)">${fmt(d.total_income || d.income || 0)}</div><div class="label">Total Income</div><span class="change" style="color:var(--color-success)">${d.income_change ? '+' + (d.income_change || 0) + '%' : ''}</span></div>
<div class="card stat-tile"><div class="value" style="color:var(--color-error)">${fmt(d.total_expenses || d.expenses || 0)}</div><div class="label">Total Expenses</div><span class="change" style="color:var(--color-error)">${d.expenses_change ? '+' + (d.expenses_change || 0) + '%' : ''}</span></div>
<div class="card stat-tile"><div class="value" style="color:var(--color-secondary)">${fmt(d.net_savings || d.savings || 0)}</div><div class="label">Net Savings</div></div>
<div class="card stat-tile"><div class="value" style="color:var(--color-warning)">${d.savings_rate || 0}%</div><div class="label">Savings Rate</div></div>
</div>
<div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
<div class="card"><div class="card-header"><div class="card-title">Income vs Expenses</div></div><div style="height:280px"><canvas id="mainChart"></canvas></div></div>
<div class="card"><div class="card-header"><div class="card-title">Category Breakdown</div></div><div style="height:280px"><canvas id="categoryChart"></canvas></div></div>
</div>
<div class="card mb-6"><div class="card-header"><div class="card-title">Trends & Patterns</div></div><div id="trends-content" style="min-height:100px"></div></div>`;
      }
      function renderMainChart(data) { const ctx = document.getElementById('mainChart')?.getContext('2d'); if (!ctx) return; const labels = (data.labels || data.dates || []).map(d => new Date(d).toLocaleDateString('en-IN', { day: '2-digit', month: 'short' })); new Chart(ctx, { type: 'line', data: { labels, datasets: [{ label: 'Income', data: data.income || data.incomes || [], borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)', fill: true, tension: .4 }, { label: 'Expenses', data: data.expenses || [], borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.1)', fill: true, tension: .4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#999' } } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { callback: v => '₹' + (v / 1000).toFixed(0) + 'K' } }, x: { grid: { display: false } } } } }) }
      function renderCategoryChart(data) { const ctx = document.getElementById('categoryChart')?.getContext('2d'); if (!ctx) return; const cats = data.categories || data || []; const labels = Array.isArray(cats) ? cats.map(c => c.name || c.category || '') : []; const values = Array.isArray(cats) ? cats.map(c => c.total || c.amount || 0) : []; const colors = ['#7c3aed', '#10b981', '#f59e0b', '#ef4444', '#6366f1', '#ec4899', '#14b8a6', '#f97316']; new Chart(ctx, { type: 'pie', data: { labels, datasets: [{ data: values, backgroundColor: colors.slice(0, labels.length) }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#999', padding: 12 } } } } }) }
      function renderTrends(data) { const items = data.trends || data.insights || data || []; const el = document.getElementById('trends-content'); if (!el) return; if (Array.isArray(items) && items.length) { el.innerHTML = items.map(t => `<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--outline-variant)"><span>${t.label || t.name || t.metric || ''}</span><span style="font-weight:600;color:${(t.change || 0) >= 0 ? 'var(--color-success)' : 'var(--color-error)'}">${t.change >= 0 ? '+' : ''}${t.change}%</span></div>`).join('') } else { el.innerHTML = '<div style="padding:24px;text-align:center;color:var(--on-surface-muted)">No trend data available for this period.</div>' } }
      document.getElementById('analytics-period')?.addEventListener('change', function () { loadAnalytics(parseInt(this.value)) });
      document.addEventListener('DOMContentLoaded', () => loadAnalytics(30));
      window.exportAnalytics = function () { const period = document.getElementById('analytics-period')?.value || 30; window.open(`/api/analytics/export?days=${period}&token=${encodeURIComponent(localStorage.getItem('finsight_token') || '')}`, '_blank') };
    })();
  </script>
</body>

</html>
