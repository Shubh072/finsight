<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>FinSight | Email Verification</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: "#0b1326",
                        surface: "#131b2e",
                        primary: "#8b5cf6",
                        secondary: "#10b981",
                        error: "#f43f5e",
                        "on-background": "#dae2fd",
                        "outline-variant": "#494454",
                        "surface-container": "#171f33"
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b1326;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(51, 65, 85, 0.5);
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.15;
        }
        @keyframes float {
            0% { transform: translate(0, 0); }
            50% { transform: translate(20px, -20px); }
            100% { transform: translate(0, 0); }
        }
        .animate-float {
            animation: float 8s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    <div class="orb w-[400px] h-[400px] bg-primary top-[-10%] left-[-10%] animate-float"></div>
    <div class="orb w-[300px] h-[300px] bg-secondary bottom-[-10%] right-[-10%] animate-float" style="animation-delay: -4s;"></div>

    <main class="relative z-10 w-full max-w-[480px]">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary/10 border border-primary/20 mb-4">
                <span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">verified</span>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-on-background">FinSight</h1>
            <p class="text-on-background/70 mt-2">Account Verification</p>
        </div>

        <div class="glass-card rounded-2xl p-8 shadow-2xl text-center flex flex-col items-center gap-6">
            <div id="status-icon-container" class="w-20 h-20 rounded-full flex items-center justify-center bg-surface border border-outline-variant">
                <span id="status-icon" class="material-symbols-outlined text-5xl">pending</span>
            </div>

            <div>
                <h2 id="status-title" class="text-2xl font-bold text-on-background">Verifying Account...</h2>
                <p id="status-message" class="text-on-background/75 mt-3 leading-relaxed">Please wait while we confirm your email address.</p>
            </div>

            <div class="w-full border-t border-outline-variant my-2"></div>

            <a id="action-btn" href="/login.html" class="w-full py-3 bg-primary text-white font-semibold rounded-xl hover:bg-primary/90 transition-all flex items-center justify-center gap-2 shadow-lg shadow-primary/25">
                Proceed to Login
                <span class="material-symbols-outlined text-md">arrow_forward</span>
            </a>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const success = urlParams.get('success');
            const message = urlParams.get('message');

            const statusIconContainer = document.getElementById('status-icon-container');
            const statusIcon = document.getElementById('status-icon');
            const statusTitle = document.getElementById('status-title');
            const statusMessage = document.getElementById('status-message');
            const actionBtn = document.getElementById('action-btn');

            if (success === 'true') {
                statusIconContainer.className = 'w-20 h-20 rounded-full flex items-center justify-center bg-secondary/10 border border-secondary/30 text-secondary';
                statusIcon.textContent = 'check_circle';
                statusTitle.textContent = 'Verification Successful!';
                statusMessage.textContent = message || 'Your email address has been verified successfully. You can now access your dashboard.';
                actionBtn.textContent = 'Proceed to Login';
                actionBtn.className = 'w-full py-3 bg-secondary text-white font-semibold rounded-xl hover:bg-secondary/90 transition-all flex items-center justify-center gap-2 shadow-lg shadow-secondary/25';
            } else if (success === 'false') {
                statusIconContainer.className = 'w-20 h-20 rounded-full flex items-center justify-center bg-error/10 border border-error/30 text-error';
                statusIcon.textContent = 'error';
                statusTitle.textContent = 'Verification Failed';
                statusMessage.textContent = message || 'The verification link is invalid or has expired. Please register again or request a new link.';
                actionBtn.textContent = 'Back to Register';
                actionBtn.setAttribute('href', '/create_account.html');
                actionBtn.className = 'w-full py-3 bg-error text-white font-semibold rounded-xl hover:bg-error/90 transition-all flex items-center justify-center gap-2 shadow-lg shadow-error/25';
            } else {
                // If loaded without query parameters
                statusIconContainer.className = 'w-20 h-20 rounded-full flex items-center justify-center bg-primary/10 border border-primary/30 text-primary';
                statusIcon.textContent = 'mail';
                statusTitle.textContent = 'Verification Link Sent';
                statusMessage.textContent = 'Please check your email inbox and click the verification link to activate your FinSight account.';
                actionBtn.textContent = 'Proceed to Login';
            }
        });
    </script>
</body>
</html>
