    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b1326;
            margin: 0;
            overflow: hidden;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(51, 65, 85, 0.5);
        }

        .input-glow:focus {
            box-shadow: 0 0 15px rgba(208, 188, 255, 0.15);
        }

        .btn-glow {
            box-shadow: 0 0 20px rgba(109, 59, 215, 0.25);
        }

        /* Mouse trail effect */
        #cursor-glow {
            pointer-events: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(109, 59, 215, 0.08) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            z-index: 0;
        }

<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-md relative">
    <!-- Atmospheric Background Animation -->

    <!-- Cursor Interactive Glow -->
    <div id="cursor-glow"></div>
    <main class="relative z-10 w-full max-w-[440px]">
        <!-- Brand Header -->
        <div class="text-center mb-lg">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary-container mb-md">
                <span class="material-symbols-outlined text-primary text-4xl"
                    style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
            </div>
            <h1 class="font-headline-lg text-headline-lg text-on-background tracking-tight">FinSight</h1>
            <p class="font-body-md text-body-md text-on-surface-variant mt-xs">Premium Wealth Management</p>
        </div>
        <!-- Login Card -->
        <div class="glass-card rounded-xl p-md md:p-lg shadow-2xl">
            <h2 class="font-headline-md text-headline-md text-on-background mb-lg">Welcome back</h2>
            <div id="error-message" class="hidden p-xs rounded bg-error-container/20 border border-error/30 text-error text-center font-label-sm text-label-sm mb-sm animate-pulse"></div>
            <form id="login-form" class="space-y-md">
                <!-- Email Field -->
                <div class="space-y-base">
                    <label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider"
                        for="email">Email Address</label>
                    <div class="relative group">
                        <span
                            class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-md transition-colors group-focus-within:text-primary">mail</span>
                        <input
                            class="w-full h-12 bg-surface-container-lowest border border-outline-variant rounded-lg pl-xl pr-md text-on-surface font-body-md focus:border-primary focus:ring-0 outline-none transition-all input-glow"
                            id="email" placeholder="name@company.com" type="email" required />
                    </div>
                </div>
                <!-- Password Field -->
                <div class="space-y-base">
                    <div class="flex justify-between items-center">
                        <label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider"
                            for="password">Password</label>
                        <a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed transition-colors"
                            href="/forgot_password.html">Forgot Password?</a>
                    </div>
                    <div class="relative group">
                        <span
                            class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-md transition-colors group-focus-within:text-primary">lock</span>
                        <input
                            class="w-full h-12 bg-surface-container-lowest border border-outline-variant rounded-lg pl-xl pr-md text-on-surface font-body-md focus:border-primary focus:ring-0 outline-none transition-all input-glow"
                            id="password" placeholder="••••••••" type="password" required />
                        <button
                            class="absolute right-sm top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors"
                            type="button">
                            <span class="material-symbols-outlined text-md">visibility</span>
                        </button>
                    </div>
                </div>
                <!-- Sign In Button -->
                <button
                    class="w-full h-12 bg-primary text-on-primary font-label-md text-label-md rounded-lg flex items-center justify-center gap-xs hover:bg-primary-fixed transition-all btn-glow mt-md"
                    type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-md">arrow_forward</span>
                </button>
            </form>
            <!-- Divider -->
            <div class="relative my-lg flex items-center">
                <div class="flex-grow border-t border-outline-variant"></div>
                <span class="flex-shrink mx-md font-label-sm text-label-sm text-outline uppercase tracking-widest">or
                    continue with</span>
                <div class="flex-grow border-t border-outline-variant"></div>
            </div>
            <!-- Social Logins -->

                            fill="currentColor"></path>
                        <path

                            fill="currentColor"></path>
                    </svg>
                    Google
                </button>
                <button
                    class="flex items-center justify-center gap-xs h-12 rounded-lg border border-outline-variant hover:bg-surface-variant transition-colors text-on-surface font-label-md text-label-md">

        <!-- Footer Link -->
        <p class="text-center mt-lg font-body-md text-body-md text-outline">
            New to FinSight?
            <a class="text-primary font-bold hover:underline decoration-primary decoration-2 underline-offset-4 ml-xs"
                href="/create_account.html">Register Now</a>
        </p>
        <!-- Decorative Info Cards -->
        <div class="hidden lg:block absolute -right-64 top-1/2 -translate-y-1/2 w-48 space-y-md">
            <div class="glass-card p-sm rounded-lg animate-pulse" style="animation-duration: 4s;">
                <p class="font-label-sm text-label-sm text-secondary mb-xs">Live Market</p>
                <p class="font-data-mono text-data-mono text-on-surface">BTC +2.45%</p>
            </div>
            <div class="glass-card p-sm rounded-lg animate-pulse" style="animation-duration: 3s;">
                <p class="font-label-sm text-label-sm text-primary mb-xs">Portfolio</p>
                <p class="font-data-mono text-data-mono text-on-surface">$128,402.12</p>
            </div>
        </div>
    </main>
    <!-- Micro-interaction Script -->
    <script>
        const glow = document.getElementById('cursor-glow');
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            glow.style.left = x + 'px';
            glow.style.top = y + 'px';
        });

        // Add subtle parallax to the card
        const card = document.querySelector('.glass-card');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });

        // Form Submit Handler
        const loginForm = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.classList.add('hidden');
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/dashboard.html';
                } else {
                    errorMessage.textContent = data.message || 'Login failed. Please try again.';
                    errorMessage.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                errorMessage.textContent = 'A network error occurred. Please try again later.';
                errorMessage.classList.remove('hidden');
            }
        });
    </script>
