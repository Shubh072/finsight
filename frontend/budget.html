<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget · FinSight</title>
  <meta name="description" content="Set and track your monthly budgets." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/css/design-system.css" />
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="/auth-guard.js"></script>
  <style>
    .budget-card {
      padding: 20px;
      border-radius: var(--radius-lg);
      margin-bottom: 16px
    }

    .budget-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px
    }

    .budget-amount {
      font-size: 24px;
      font-weight: 800
    }

    .budget-progress {
      height: 10px;
      border-radius: 5px;
      background: var(--surface-container);
      overflow: hidden;
      margin-bottom: 8px
    }

    .budget-progress-bar {
      height: 100%;
      border-radius: 5px;
      transition: width .5s ease
    }

    .budget-meta {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--on-surface-muted)
    }

    .empty-state {
      padding: 60px 20px;
      text-align: center
    }

    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface-base);
      border-top: 1px solid var(--outline);
      z-index: 250;
      padding: 6px 0 max(6px, env(safe-area-inset-bottom))
    }

    .mob-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 4px;
      font-size: 10px;
      font-weight: 600;
      color: var(--on-surface-muted);
      transition: all .2s;
      flex: 1;
      cursor: pointer;
      text-decoration: none
    }

    .mob-nav-item.active,
    .mob-nav-item:hover {
      color: var(--color-primary)
    }

    .mob-nav-item .material-symbols-outlined {
      font-size: 22px
    }

    @media(max-width:767px) {
      .mobile-nav {
        display: flex
      }

      .app-content {
        padding-bottom: 80px !important
      }
    }
  </style>
</head>

<body>
  <div class="app-layout">
    <aside class="app-sidebar" id="app-sidebar">[sidebar]</aside>
    <div class="app-main">
      <header class="app-header">[header]</header>
      <main class="app-content">
        <div class="page-header">
          <div>
            <h1>Budget</h1>
            <p style="font-size:14px;color:var(--on-surface-muted);margin-top:4px">Control your spending by category</p>
          </div>
          <button class="btn btn-primary btn-md" onclick="showAddBudget()"><span
              class="material-symbols-outlined">add</span>Create Budget</button>
        </div>
        <div id="budget-list">
          <div class="card" style="padding:40px;text-align:center;color:var(--on-surface-muted)"><span
              class="material-symbols-outlined"
              style="font-size:40px;display:block;margin-bottom:12px">account_balance</span>Loading budgets...</div>
        </div>
      </main>
    </div>
    <nav class="mobile-nav">
      <a href="/dashboard.html" class="mob-nav-item"><span class="material-symbols-outlined">dashboard</span>Home</a>
      <a href="/expense.html" class="mob-nav-item"><span class="material-symbols-outlined">payments</span>Expenses</a>
      <a href="/budget.html" class="mob-nav-item active"><span
          class="material-symbols-outlined">account_balance</span>Budget</a>
      <a href="/investment.html" class="mob-nav-item"><span
          class="material-symbols-outlined">trending_up</span>Invest</a>
      <a href="/setting.html" class="mob-nav-item"><span class="material-symbols-outlined">settings</span>Settings</a>
    </nav>
  </div>
  <div id="budget-modal"
    style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;align-items:center;justify-content:center;padding:20px"
    onclick="if(event.target===this)closeBudgetModal()">
    <div
      style="width:100%;max-width:420px;background:var(--surface-base);border-radius:var(--radius-2xl);padding:28px;box-shadow:var(--shadow-2xl)">
      <h3 style="font-size:18px;font-weight:800;margin-bottom:16px" id="budget-modal-title">Create Budget</h3>
      <form id="budget-form">
        <div class="form-group"><label class="form-label">Category</label><select id="budget-category"
            class="form-select" required>
            <option value="">Select category</option>
            <option>Food & Dining</option>
            <option>Transportation</option>
            <option>Shopping</option>
            <option>Bills & Utilities</option>
            <option>Entertainment</option>
            <option>Healthcare</option>
            <option>Education</option>
            <option>Travel</option>
            <option>Groceries</option>
            <option>Other</option>
          </select></div>
        <div class="form-group"><label class="form-label">Monthly Limit (₹)</label><input type="number"
            id="budget-amount" class="form-input" placeholder="5000" min="1" step="0.01" required style="height:44px" />
        </div>
        <div class="form-group"><label class="form-label">Month</label><input type="month" id="budget-month"
            class="form-input" required style="height:44px" /></div>
        <div style="display:flex;gap:10px;margin-top:8px"><button type="button" class="btn btn-outline btn-md"
            style="flex:1" onclick="closeBudgetModal()">Cancel</button><button type="submit"
            class="btn btn-primary btn-md" style="flex:1" id="budget-save-btn">Save Budget</button></div>
      </form>
    </div>
  </div>
  <script>
    (function () {
      'use strict'; const API = '/api';
      function getToken() { return localStorage.getItem('finsight_token') || localStorage.getItem('access_token') }
      async function api(url, opts = {}) { const t = getToken(); opts.headers = { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json', ...opts.headers }; const res = await fetch(API + url, opts); if (!res.ok) throw new Error(await res.text()); return res.json() }
      function fmt(n, c = 'INR') { return new Intl.NumberFormat('en-IN', { style: 'currency', currency: c, minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(n || 0) }
      function fmtMonth(m) { const d = new Date(m + '-01'); return d.toLocaleDateString('en-IN', { month: 'long', year: 'numeric' }) }
      function loadBudgets() { api('/budgets').then(data => { const items = data.budgets || data.data || []; renderBudgets(items) }).catch(() => { document.getElementById('budget-list').innerHTML = '<div class="card" style="padding:40px;text-align:center;color:var(--on-surface-muted)">Failed to load budgets.</div>' }) }
      function renderBudgets(items) {
        const el = document.getElementById('budget-list'); if (!el) return; if (!items.length) { el.innerHTML = '<div class="card empty-state"><span class="material-symbols-outlined" style="font-size:48px;display:block;margin-bottom:16px;color:var(--on-surface-muted)">account_balance</span><h3 style="font-size:18px;margin-bottom:8px">No budgets yet</h3><p style="color:var(--on-surface-muted);margin-bottom:20px;font-size:14px">Create your first budget to start tracking your spending.</p><button class="btn btn-primary" onclick="showAddBudget()"><span class="material-symbols-outlined">add</span>Create Budget</button></div>'; return }
        el.innerHTML = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px">' + items.map(b => { const pct = b.spent && b.amount ? Math.min((b.spent / b.amount) * 100, 100) : 0; const barColor = pct > 90 ? 'var(--color-error)' : pct > 70 ? 'var(--color-warning)' : 'var(--color-success)'; return '<div class="card budget-card"><div class="budget-header"><div><div style="font-weight:600;font-size:13px">' + b.category + '</div><div style="font-size:11px;color:var(--on-surface-muted)">' + fmtMonth(b.month) + '</div></div><div style="text-align:right"><div class="budget-amount" style="color:' + barColor + '">' + fmt(b.spent || 0) + '</div><div style="font-size:12px;color:var(--on-surface-muted)">of ' + fmt(b.amount) + '</div></div></div><div class="budget-progress"><div class="budget-progress-bar" style="width:' + pct + '%;background:' + barColor + '"></div></div><div class="budget-meta"><span>' + pct.toFixed(0) + '% used</span><span style="font-weight:600;color:' + ((b.amount - b.spent) <= 0 ? 'var(--color-error)' : 'var(--color-success)') + '">' + ((b.amount - b.spent) > 0 ? fmt(b.amount - b.spent) + ' remaining' : 'Exceeded!') + '</span></div><div style="margin-top:10px"><button class="btn btn-ghost btn-sm" onclick="deleteBudget(\'' + b.id + '\')"><span class="material-symbols-outlined" style="font-size:14px">delete</span>Delete</button></div></div>' }).join('') + '</div>'
      }
      window.deleteBudget = async function (id) { if (!confirm('Delete this budget?')) return; try { await fetch(API + '/budgets/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + getToken() } }); loadBudgets() } catch (e) { alert('Failed to delete') } }
      window.showAddBudget = function () { const now = new Date(); document.getElementById('budget-month').value = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0'); document.getElementById('budget-modal').style.display = 'flex' };
      window.closeBudgetModal = function () { document.getElementById('budget-modal').style.display = 'none' };
      document.getElementById('budget-form')?.addEventListener('submit', async function (e) { e.preventDefault(); const btn = document.getElementById('budget-save-btn'); btn.disabled = true; btn.textContent = 'Saving...'; try { await api('/budgets', { method: 'POST', body: JSON.stringify({ category: document.getElementById('budget-category').value, amount: parseFloat(document.getElementById('budget-amount').value), month: document.getElementById('budget-month').value }) }); closeBudgetModal(); loadBudgets() } catch (e) { alert('Failed to create budget') } finally { btn.disabled = false; btn.textContent = 'Save Budget' } });
      document.addEventListener('DOMContentLoaded', loadBudgets);
    })();
  </script>
</body>

</html>
