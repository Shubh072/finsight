<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password · FinSight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/css/design-system.css" />
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-dim);
      padding: 32px 20px;
      position: relative;
      overflow: hidden
    }

    .auth-page::before {
      content: '';
      position: absolute;
      top: -30%;
      left: -10%;
      width: 60%;
      height: 80%;
      background: radial-gradient(circle, rgba(124, 58, 237, .12), transparent 70%);
      pointer-events: none
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      background: var(--surface-base);
      border: 1px solid var(--outline);
      border-radius: var(--radius-2xl);
      padding: 40px;
      position: relative;
      z-index: 1;
      box-shadow: var(--shadow-2xl);
      animation: slide-up 500ms cubic-bezier(.22, 1, .36, 1) forwards
    }

    @keyframes slide-up {
      from {
        opacity: 0;
        transform: translateY(24px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }
  </style>
</head>

<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:32px">
        <div
          style="width:36px;height:36px;background:var(--color-primary-gradient);border-radius:10px;display:flex;align-items:center;justify-content:center">
          <span class="material-symbols-outlined" style="font-size:18px;color:white">insights</span></div>
        <span style="font-size:20px;font-weight:800;color:var(--on-surface)">FinSight</span>
      </a>

      <!-- Step 1: Email Input -->
      <div id="step-email">
        <div
          style="width:56px;height:56px;background:var(--color-primary-bg);border-radius:var(--radius-xl);display:flex;align-items:center;justify-content:center;margin-bottom:20px">
          <span class="material-symbols-outlined" style="font-size:28px;color:var(--color-primary)">lock_reset</span>
        </div>
        <h1 style="font-size:24px;font-weight:800;color:var(--on-surface);margin-bottom:8px">Forgot your password?</h1>
        <p style="font-size:14px;color:var(--on-surface-muted);margin-bottom:28px;line-height:1.6">No worries! Enter
          your email address and we'll send you a password reset link.</p>

        <div id="fp-error"
          style="background:var(--color-error-bg);border:1px solid rgba(239,68,68,.2);color:var(--color-error);font-size:13px;padding:12px 14px;border-radius:var(--radius-md);margin-bottom:16px;display:none;align-items:center;gap:8px">
          <span class="material-symbols-outlined" style="font-size:16px">error</span><span
            id="fp-error-text">Error</span>
        </div>

        <form id="fp-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="fp-email">Email address</label>
            <input type="email" id="fp-email" class="form-input" placeholder="you@example.com" style="height:44px"
              required />
            <div class="form-error" id="fp-email-err"></div>
          </div>
          <button type="submit" class="btn btn-primary btn-lg btn-full" id="fp-btn"
            style="height:48px;font-size:15px;margin-bottom:20px">
            <span id="fp-btn-text">Send Reset Link</span>
            <span id="fp-spinner"
              style="display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite"></span>
          </button>
        </form>
        <div style="text-align:center"><a href="/login"
            style="font-size:14px;color:var(--color-primary);font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:6px"><span
              class="material-symbols-outlined" style="font-size:16px">arrow_back</span>Back to Sign In</a></div>
      </div>

      <!-- Step 2: Success -->
      <div id="step-success" style="display:none;text-align:center">
        <div
          style="width:72px;height:72px;background:var(--color-success-bg);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
          <span class="material-symbols-outlined"
            style="font-size:36px;color:var(--color-success)">mark_email_read</span>
        </div>
        <h2 style="font-size:22px;font-weight:800;margin-bottom:10px">Check your email</h2>
        <p style="font-size:14px;color:var(--on-surface-muted);margin-bottom:28px;line-height:1.7">We've sent a password
          reset link to <strong id="sent-email" style="color:var(--on-surface)">your email</strong>. It expires in 15
          minutes.</p>
        <a href="/login" class="btn btn-primary btn-md btn-full" style="margin-bottom:12px">Back to Sign In</a>
        <button
          onclick="document.getElementById('step-success').style.display='none';document.getElementById('step-email').style.display='block'"
          class="btn btn-ghost btn-md btn-full">Try a different email</button>
      </div>
    </div>
  </div>
  <script>
    const t = localStorage.getItem('finsight_theme') || 'dark';
    document.documentElement.classList.toggle('dark', t === 'dark');

    document.getElementById('fp-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('fp-email').value.trim();
      document.getElementById('fp-email-err').textContent = '';
      if (!email) { document.getElementById('fp-email-err').textContent = 'Email is required'; return; }
      const btn = document.getElementById('fp-btn');
      const txt = document.getElementById('fp-btn-text');
      const spin = document.getElementById('fp-spinner');
      btn.disabled = true; txt.style.display = 'none'; spin.style.display = 'inline-block';
      try {
        await axios.post('/api/auth/forgot-password', { email });
        document.getElementById('sent-email').textContent = email;
        document.getElementById('step-email').style.display = 'none';
        document.getElementById('step-success').style.display = 'block';
      } catch (err) {
        const msg = err.response?.data?.message || 'Something went wrong. Please try again.';
        document.getElementById('fp-error-text').textContent = msg;
        document.getElementById('fp-error').style.display = 'flex';
      } finally {
        btn.disabled = false; txt.style.display = 'inline'; spin.style.display = 'none';
      }
    });
  </script>
</body>

</html>
