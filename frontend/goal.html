<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goals · FinSight</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/css/design-system.css" />
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="/auth-guard.js"></script>
  <style>
    .goal-card {
      padding: 20px;
      border-radius: var(--radius-lg);
      margin-bottom: 16px
    }

    .goal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px
    }

    .goal-amount {
      font-size: 22px;
      font-weight: 800
    }

    .goal-progress {
      height: 8px;
      border-radius: 4px;
      background: var(--surface-container);
      overflow: hidden;
      margin-bottom: 8px
    }

    .goal-progress-bar {
      height: 100%;
      border-radius: 4px;
      background: var(--color-primary-gradient);
      transition: width .5s ease
    }

    .goal-meta {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--on-surface-muted)
    }

    .goal-deadline {
      font-size: 12px;
      color: var(--on-surface-muted);
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 4px
    }

    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface-base);
      border-top: 1px solid var(--outline);
      z-index: 250;
      padding: 6px 0 max(6px, env(safe-area-inset-bottom))
    }

    .mob-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 4px;
      font-size: 10px;
      font-weight: 600;
      color: var(--on-surface-muted);
      transition: all .2s;
      flex: 1;
      cursor: pointer;
      text-decoration: none
    }

    .mob-nav-item.active,
    .mob-nav-item:hover {
      color: var(--color-primary)
    }

    .mob-nav-item .material-symbols-outlined {
      font-size: 22px
    }

    @media(max-width:767px) {
      .mobile-nav {
        display: flex
      }

      .app-content {
        padding-bottom: 80px !important
      }
    }
  </style>
</head>

<body>
  <div class="app-layout">
    <aside class="app-sidebar">[sidebar]</aside>
    <div class="app-main">
      <header class="app-header">[header]</header>
      <main class="app-content">
        <div class="page-header">
          <div>
            <h1>Financial Goals</h1>
            <p style="font-size:14px;color:var(--on-surface-muted);margin-top:4px">Set and track your financial
              milestones</p>
          </div><button class="btn btn-primary btn-md" onclick="showAddGoal()"><span
              class="material-symbols-outlined">add</span>New Goal</button>
        </div>
        <div id="goal-list">
          <div class="card" style="padding:40px;text-align:center;color:var(--on-surface-muted)"><span
              class="material-symbols-outlined"
              style="font-size:40px;display:block;margin-bottom:12px">flag</span>Loading goals...</div>
        </div>
      </main>
    </div>
    <nav class="mobile-nav"><a href="/dashboard.html" class="mob-nav-item"><span
          class="material-symbols-outlined">dashboard</span>Home</a><a href="/expense.html" class="mob-nav-item"><span
          class="material-symbols-outlined">payments</span>Expenses</a><a href="/budget.html" class="mob-nav-item"><span
          class="material-symbols-outlined">account_balance</span>Budget</a><a href="/investment.html"
        class="mob-nav-item"><span class="material-symbols-outlined">trending_up</span>Invest</a><a href="/setting.html"
        class="mob-nav-item"><span class="material-symbols-outlined">settings</span>Settings</a></nav>
  </div>
  <div id="goal-modal"
    style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;align-items:center;justify-content:center;padding:20px"
    onclick="if(event.target===this)closeGoalModal()">
    <div
      style="width:100%;max-width:440px;background:var(--surface-base);border-radius:var(--radius-2xl);padding:28px;box-shadow:var(--shadow-2xl)">
      <h3 style="font-size:18px;font-weight:800;margin-bottom:16px">Create Financial Goal</h3>
      <form id="goal-form">
        <div class="form-group"><label class="form-label">Goal Name</label><input type="text" id="goal-name"
            class="form-input" placeholder="Emergency Fund" required style="height:44px" /></div>
        <div class="form-group"><label class="form-label">Target Amount (₹)</label><input type="number" id="goal-amount"
            class="form-input" placeholder="100000" min="1" required style="height:44px" /></div>
        <div class="form-group"><label class="form-label">Current Savings (₹)</label><input type="number"
            id="goal-current" class="form-input" placeholder="0" min="0" style="height:44px" /></div>
        <div class="form-group"><label class="form-label">Target Date</label><input type="date" id="goal-date"
            class="form-input" required style="height:44px" /></div>
        <div style="display:flex;gap:10px;margin-top:8px"><button type="button" class="btn btn-outline btn-md"
            style="flex:1" onclick="closeGoalModal()">Cancel</button><button type="submit"
            class="btn btn-primary btn-md" style="flex:1" id="goal-save-btn">Save Goal</button></div>
      </form>
    </div>
  </div>
  <script>
    (function () {
      'use strict'; const API = '/api';
      function getToken() { return localStorage.getItem('finsight_token') || localStorage.getItem('access_token') }
      async function api(url, opts = {}) { const t = getToken(); opts.headers = { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json', ...opts.headers }; const res = await fetch(API + url, opts); if (!res.ok) throw new Error(await res.text()); return res.json() }
      function fmt(n, c = 'INR') { return new Intl.NumberFormat('en-IN', { style: 'currency', currency: c, minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(n || 0) }
      function loadGoals() { api('/goals').then(response => { const items = response.data?.goals || response.data?.data || response.goals || response.data || []; renderGoals(items) }).catch(() => { document.getElementById('goal-list').innerHTML = '<div class="card" style="padding:40px;text-align:center;color:var(--on-surface-muted)">Failed to load goals.</div>' }) }
      function renderGoals(items) {
        const el = document.getElementById('goal-list'); if (!el) return; if (!items.length) { el.innerHTML = '<div class="card" style="padding:60px 40px;text-align:center"><span class="material-symbols-outlined" style="font-size:48px;display:block;margin-bottom:16px;color:var(--on-surface-muted)">flag</span><h3 style="font-size:18px;margin-bottom:8px">No goals yet</h3><p style="color:var(--on-surface-muted);margin-bottom:20px;font-size:14px">Set your first financial goal to start tracking progress.</p><button class="btn btn-primary" onclick="showAddGoal()"><span class="material-symbols-outlined">add</span>New Goal</button></div>'; return }
        el.innerHTML = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px">' + items.map(g => { const pct = g.current_amount && g.target_amount ? Math.min((g.current_amount / g.target_amount) * 100, 100) : 0; const deadline = g.target_date ? new Date(g.target_date).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) : ''; return '<div class="card goal-card"><div class="goal-header"><div style="font-weight:700;font-size:15px">' + g.name + '</div><div class="goal-amount" style="color:var(--color-primary)">' + fmt(g.target_amount) + '</div></div><div class="goal-progress"><div class="goal-progress-bar" style="width:' + pct + '%"></div></div><div class="goal-meta"><span>' + fmt(g.current_amount || 0) + ' saved</span><span>' + pct.toFixed(0) + '% complete</span></div><div class="goal-deadline"><span class="material-symbols-outlined" style="font-size:14px">calendar_today</span>Target: ' + deadline + '</div><div style="margin-top:10px;display:flex;gap:8px"><button class="btn btn-ghost btn-sm" onclick="contributeGoal(\'' + g.id + '\')"><span class="material-symbols-outlined" style="font-size:14px">add</span>Add Funds</button><button class="btn btn-ghost btn-sm" onclick="deleteGoal(\'' + g.id + '\')"><span class="material-symbols-outlined" style="font-size:14px">delete</span></button></div></div>' }).join('') + '</div>'
      }
      window.deleteGoal = async function (id) { if (!confirm('Delete this goal?')) return; try { await fetch(API + '/goals/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + getToken() } }); loadGoals() } catch (e) { alert('Failed to delete') } }
      window.contributeGoal = async function (id) { const val = prompt('Add amount (₹):'); if (!val || isNaN(parseFloat(val)) || parseFloat(val) <= 0) return; try { await api('/goals/' + id + '/contribute', { method: 'POST', body: JSON.stringify({ amount: parseFloat(val) }) }); loadGoals() } catch (e) { alert('Failed to add contribution') } }
      window.showAddGoal = function () { const d = new Date(); d.setFullYear(d.getFullYear() + 1); document.getElementById('goal-date').value = d.toISOString().split('T')[0]; document.getElementById('goal-modal').style.display = 'flex' };
      window.closeGoalModal = function () { document.getElementById('goal-modal').style.display = 'none' };
      document.getElementById('goal-form')?.addEventListener('submit', async function (e) { e.preventDefault(); const btn = document.getElementById('goal-save-btn'); btn.disabled = true; btn.textContent = 'Saving...'; try { await api('/goals', { method: 'POST', body: JSON.stringify({ name: document.getElementById('goal-name').value, target_amount: parseFloat(document.getElementById('goal-amount').value), current_amount: parseFloat(document.getElementById('goal-current').value) || 0, target_date: document.getElementById('goal-date').value }) }); closeGoalModal(); loadGoals() } catch (e) { alert('Failed to create goal') } finally { btn.disabled = false; btn.textContent = 'Save Goal' } });
      document.addEventListener('DOMContentLoaded', loadGoals);
    })();
  </script>
</body>

</html>
