<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Investments · FinSight</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/css/design-system.css" />
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="/auth-guard.js"></script>
  <style>
    .inv-card {
      padding: 16px;
      border-radius: var(--radius-lg);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all .2s
    }

    .inv-card:hover {
      transform: translateX(4px)
    }

    .inv-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }

    .inv-type-stock {
      background: var(--color-primary-bg);
      color: var(--color-primary)
    }

    .inv-type-mutual_fund {
      background: var(--color-secondary-bg);
      color: var(--color-secondary)
    }

    .inv-type-crypto {
      background: var(--color-warning-bg);
      color: var(--color-warning)
    }

    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface-base);
      border-top: 1px solid var(--outline);
      z-index: 250;
      padding: 6px 0 max(6px, env(safe-area-inset-bottom))
    }

    .mob-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 4px;
      font-size: 10px;
      font-weight: 600;
      color: var(--on-surface-muted);
      transition: all .2s;
      flex: 1;
      cursor: pointer;
      text-decoration: none
    }

    .mob-nav-item.active,
    .mob-nav-item:hover {
      color: var(--color-primary)
    }

    .mob-nav-item .material-symbols-outlined {
      font-size: 22px
    }

    @media(max-width:767px) {
      .mobile-nav {
        display: flex
      }

      .app-content {
        padding-bottom: 80px !important
      }
    }
  </style>
</head>

<body>
  <div class="app-layout">
    <aside class="app-sidebar">[sidebar]</aside>
    <div class="app-main">
      <header class="app-header">[header]</header>
      <main class="app-content">
        <div class="page-header">
          <div>
            <h1>Investments</h1>
            <p style="font-size:14px;color:var(--on-surface-muted);margin-top:4px">Track your portfolio performance</p>
          </div><button class="btn btn-primary btn-md" onclick="showAddInvestment()"><span
              class="material-symbols-outlined">add</span>Add Investment</button>
        </div>
        <div id="portfolio-summary" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6"></div>
        <div id="investment-list">
          <div class="card" style="padding:40px;text-align:center;color:var(--on-surface-muted)"><span
              class="material-symbols-outlined"
              style="font-size:40px;display:block;margin-bottom:12px">trending_up</span>Loading investments...</div>
        </div>
      </main>
    </div>
    <nav class="mobile-nav"><a href="/dashboard.html" class="mob-nav-item"><span
          class="material-symbols-outlined">dashboard</span>Home</a><a href="/expense.html" class="mob-nav-item"><span
          class="material-symbols-outlined">payments</span>Expenses</a><a href="/budget.html" class="mob-nav-item"><span
          class="material-symbols-outlined">account_balance</span>Budget</a><a href="/investment.html"
        class="mob-nav-item active"><span class="material-symbols-outlined">trending_up</span>Invest</a><a
        href="/setting.html" class="mob-nav-item"><span class="material-symbols-outlined">settings</span>Settings</a>
    </nav>
  </div>
  <div id="inv-modal"
    style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;align-items:center;justify-content:center;padding:20px"
    onclick="if(event.target===this)closeInvModal()">
    <div
      style="width:100%;max-width:460px;background:var(--surface-base);border-radius:var(--radius-2xl);padding:28px;box-shadow:var(--shadow-2xl)">
      <h3 style="font-size:18px;font-weight:800;margin-bottom:16px">Add Investment</h3>
      <form id="inv-form">
        <div class="form-group"><label class="form-label">Type</label><select id="inv-type" class="form-select">
            <option value="stock">Stock</option>
            <option value="mutual_fund">Mutual Fund</option>
            <option value="crypto">Crypto</option>
            <option value="etf">ETF</option>
            <option value="bond">Bond</option>
            <option value="other">Other</option>
          </select></div>
        <div class="form-group"><label class="form-label">Name / Symbol</label><input type="text" id="inv-name"
            class="form-input" placeholder="RELIANCE" required style="height:44px" /></div>
        <div class="form-group"><label class="form-label">Quantity</label><input type="number" id="inv-qty"
            class="form-input" placeholder="10" min="0" step="0.001" style="height:44px" /></div>
        <div class="form-group"><label class="form-label">Buy Price (per unit ₹)</label><input type="number"
            id="inv-buy" class="form-input" placeholder="2500" min="0" step="0.01" style="height:44px" /></div>
        <div class="form-group"><label class="form-label">Current Price (per unit ₹)</label><input type="number"
            id="inv-current" class="form-input" placeholder="2700" min="0" step="0.01" style="height:44px" /></div>
        <div style="display:flex;gap:10px;margin-top:8px"><button type="button" class="btn btn-outline btn-md"
            style="flex:1" onclick="closeInvModal()">Cancel</button><button type="submit" class="btn btn-primary btn-md"
            style="flex:1" id="inv-save-btn">Add Investment</button></div>
      </form>
    </div>
  </div>
  <script>
    (function () {
      'use strict'; const API = '/api';
      function getToken() { return localStorage.getItem('finsight_token') || localStorage.getItem('access_token') }
      async function req(url, opts = {}) { const t = getToken(); opts.headers = { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json', ...opts.headers }; const res = await fetch(API + url, opts); if (!res.ok) throw new Error(await res.text()); return res.json() }
      function fmt(n, c = 'INR') { return new Intl.NumberFormat('en-IN', { style: 'currency', currency: c, minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(n || 0) }
      function loadInvestments() { req('/investments').then(data => { const items = data.investments || data.data || []; renderSummary(items); renderInvestments(items) }).catch(() => { document.getElementById('investment-list').innerHTML = '<div class="card" style="padding:40px;text-align:center;color:var(--on-surface-muted)">Failed to load investments.</div>' }) }
      function renderSummary(items) { const el = document.getElementById('portfolio-summary'); if (!el) return; const totalValue = items.reduce((s, i) => s + ((i.current_price || i.current_value || 0) * (i.quantity || 1)), 0); const totalCost = items.reduce((s, i) => s + ((i.buy_price || 0) * (i.quantity || 1)), 0); const returns = totalCost > 0 ? ((totalValue - totalCost) / totalCost * 100) : 0; el.innerHTML = '<div class="card card-primary" style="text-align:center;padding:20px"><div style="font-size:12px;color:rgba(255,255,255,0.7);margin-bottom:4px">Portfolio Value</div><div style="font-size:32px;font-weight:800;color:#fff">' + fmt(totalValue) + '</div></div><div class="card card-hover" style="text-align:center;padding:20px"><div style="font-size:12px;color:var(--on-surface-muted);margin-bottom:4px">Total Invested</div><div style="font-size:24px;font-weight:800">' + fmt(totalCost) + '</div></div><div class="card card-hover" style="text-align:center;padding:20px"><div style="font-size:12px;color:var(--on-surface-muted);margin-bottom:4px">Total Returns</div><div style="font-size:24px;font-weight:800;color:' + (returns >= 0 ? 'var(--color-success)' : 'var(--color-error)') + '">' + (returns >= 0 ? '+' : '') + returns.toFixed(1) + '%</div><div style="font-size:13px;color:' + (returns >= 0 ? 'var(--color-success)' : 'var(--color-error)') + '">' + (returns >= 0 ? '+' : '') + fmt(totalValue - totalCost) + '</div></div>' }
      function renderInvestments(items) {
        const el = document.getElementById('investment-list'); if (!el) return; if (!items.length) { el.innerHTML = '<div class="card" style="padding:60px 40px;text-align:center"><span class="material-symbols-outlined" style="font-size:48px;display:block;margin-bottom:16px;color:var(--on-surface-muted)">trending_up</span><h3 style="font-size:18px;margin-bottom:8px">No investments yet</h3><p style="color:var(--on-surface-muted);margin-bottom:20px;font-size:14px">Start building your portfolio by adding your first investment.</p><button class="btn btn-primary" onclick="showAddInvestment()"><span class="material-symbols-outlined">add</span>Add Investment</button></div>'; return }
        const typeIcons = { 'stock': 'trending_up', 'mutual_fund': 'account_balance', 'crypto': 'currency_bitcoin', 'etf': 'pie_chart', 'bond': 'savings', 'other': 'show_chart' }; const typeColors = { 'stock': 'inv-type-stock', 'mutual_fund': 'inv-type-mutual_fund', 'crypto': 'inv-type-crypto', 'etf': 'inv-type-stock', 'bond': 'inv-type-mutual_fund', 'other': 'inv-type-stock' }
        el.innerHTML = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px">' + items.map(i => { const val = (i.current_price || i.current_value || 0) * (i.quantity || 1); const cost = (i.buy_price || 0) * (i.quantity || 1); const ret = cost > 0 ? ((val - cost) / cost * 100) : 0; return '<div class="card inv-card" onclick="window.open(\'https://www.google.com/finance/quote/' + i.name + ':NSE\',\'_blank\')"><div class="inv-icon ' + (typeColors[i.type] || 'inv-type-stock') + '"><span class="material-symbols-outlined">' + (typeIcons[i.type] || 'show_chart') + '</span></div><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:14px">' + i.name + '</div><div style="font-size:11px;color:var(--on-surface-muted)">' + i.quantity + ' units × ₹' + (i.buy_price || 0) + '</div></div><div style="text-align:right"><div style="font-weight:700;font-size:14px">' + fmt(val) + '</div><div style="font-size:12px;font-weight:600;color:' + (ret >= 0 ? 'var(--color-success)' : 'var(--color-error)') + '">' + (ret >= 0 ? '+' : '') + ret.toFixed(1) + '%</div></div></div>' }).join('') + '</div>'
      }
      window.showAddInvestment = function () { document.getElementById('inv-modal').style.display = 'flex' };
      window.closeInvModal = function () { document.getElementById('inv-modal').style.display = 'none' };
      document.getElementById('inv-form')?.addEventListener('submit', async function (e) { e.preventDefault(); const btn = document.getElementById('inv-save-btn'); btn.disabled = true; btn.textContent = 'Adding...'; try { await req('/investments', { method: 'POST', body: JSON.stringify({ type: document.getElementById('inv-type').value, name: document.getElementById('inv-name').value, quantity: parseFloat(document.getElementById('inv-qty').value) || 1, buy_price: parseFloat(document.getElementById('inv-buy').value) || 0, current_price: parseFloat(document.getElementById('inv-current').value) || 0 }) }); closeInvModal(); loadInvestments() } catch (e) { alert('Failed to add investment') } finally { btn.disabled = false; btn.textContent = 'Add Investment' } });
      document.addEventListener('DOMContentLoaded', loadInvestments);
    })();
  </script>
</body>

</html>
